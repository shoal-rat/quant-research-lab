    <rect x="288" y="430" width="226" height="48" rx="9" class="boxData"/>
    <text x="302" y="451" class="boxName">fetch-market-data</text>
    <text x="302" y="468" class="boxSub">keyless Yahoo refresh, one command</text>
    <rect x="530" y="430" width="226" height="48" rx="9" class="boxData"/>
    <text x="544" y="451" class="boxName">dialogue-bridge</text>
    <text x="544" y="468" class="boxSub">127.0.0.1 · dialogue + research brain</text>
    <rect x="772" y="430" width="276" height="48" rx="9" class="boxData"/>
    <text x="786" y="451" class="boxName">Claude Code / Codex CLI</text>
    <text x="786" y="468" class="boxSub">your subscription, no API key needed</text>
  </g>

  <!-- wires -->
  <path class="wire" d="M 132 156 L 132 202"/>
  <path class="wire" d="M 467 142 C 467 178 410 182 392 202"/>
  <path class="wire" d="M 639 142 C 639 178 880 182 890 202"/>
  <path class="wire" d="M 303 156 C 303 182 760 188 800 202"/>
  <path class="wire" d="M 268 230 L 280 230"/>
  <path class="wire" d="M 490 230 L 502 230"/>
  <path class="wire" d="M 910 268 L 910 314"/>
