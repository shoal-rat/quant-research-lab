<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Architecture diagram">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23282c"/>
      <stop offset="1" stop-color="#1a1e21"/>
    </linearGradient>
    <marker id="aarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8fb8c9"/>
    </marker>
    <style>
      .lane { fill: rgba(255,255,255,0.045); stroke: rgba(255,255,255,0.14); stroke-width: 1.5; }
      .laneTitle { font: 800 14px 'Segoe UI', system-ui, sans-serif; fill: #9fd2c4; letter-spacing: 1.4px; }
      .box { fill: #2c3338; stroke: #56e4bc; stroke-width: 1.6; }
      .boxAlt { fill: #2c3338; stroke: #e9b455; stroke-width: 1.6; }
      .boxData { fill: #2c3338; stroke: #c792ea; stroke-width: 1.6; }
      .boxName { font: 700 14px 'Consolas', 'Segoe UI Mono', monospace; fill: #ecf4f1; }
      .boxSub { font: 500 11px 'Segoe UI', system-ui, sans-serif; fill: #93a8a2; }
      .wire { fill: none; stroke: #8fb8c9; stroke-width: 1.8; marker-end: url(#aarr); opacity: 0.85; }
      .ahdr { font: 800 22px 'Segoe UI', system-ui, sans-serif; fill: #f0ece2; }
    </style>
  </defs>

  <rect width="1100" height="560" rx="16" fill="url(#abg)" stroke="#39424a" stroke-width="2"/>
  <text x="36" y="42" class="ahdr">Architecture</text>

  <!-- Presentation lane -->
  <rect x="36" y="60" width="1028" height="96" rx="12" class="lane"/>
  <text x="52" y="82" class="laneTitle">GAME SHELL (React)</text>
  <g>
