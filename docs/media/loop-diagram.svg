<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Research loop diagram">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf5ea"/>
      <stop offset="1" stop-color="#f2e7d3"/>
    </linearGradient>
    <linearGradient id="lgold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9b455"/>
      <stop offset="1" stop-color="#d49b41"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5232"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9c95"/>
    </marker>
    <style>
      .node { fill: #fffdf7; stroke: #7a5232; stroke-width: 2; }
      .nodeTitle { font: 700 16px 'Segoe UI', system-ui, sans-serif; fill: #3c2e1f; }
      .nodeSub { font: 500 12px 'Segoe UI', system-ui, sans-serif; fill: #82705a; }
      .gate { font: 700 12.5px 'Segoe UI', system-ui, sans-serif; fill: #a33b35; }
      .flow { fill: none; stroke: #7a5232; stroke-width: 2.4; marker-end: url(#arr); }
      .steer { fill: none; stroke: #2f9c95; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrTeal); animation: flowdash 3.2s linear infinite; }
      @keyframes flowdash { to { stroke-dashoffset: -52; } }
      .hdr { font: 800 23px 'Segoe UI', system-ui, sans-serif; fill: #3c2e1f; }
      .lbl { font: 700 13px 'Segoe UI', system-ui, sans-serif; fill: #2f9c95; }
    </style>
  </defs>

  <rect width="1100" height="560" rx="16" fill="url(#lbg)" stroke="#d8c5a5" stroke-width="2"/>
  <text x="40" y="48" class="hdr">The self-iterating research loop</text>
  <text x="40" y="72" class="nodeSub">every box is acted out by the characters in the office — every number they say is real</text>

  <!-- nodes -->
  <g>
    <rect x="40" y="110" width="200" height="74" rx="12" class="node"/>
    <text x="58" y="140" class="nodeTitle">1 · Hypothesis</text>
    <text x="58" y="159" class="nodeSub">UCB explore / refine lineage</text>
    <text x="58" y="174" class="nodeSub">15-family knowledge base</text>

    <rect x="290" y="110" width="190" height="74" rx="12" class="node"/>
    <text x="308" y="140" class="nodeTitle">2 · Data check</text>
    <text x="308" y="159" class="nodeSub">timestamp + coverage audit</text>
    <text x="308" y="174" class="nodeSub">no lookahead, no leaks</text>

    <rect x="530" y="110" width="190" height="74" rx="12" class="node"/>
    <text x="548" y="140" class="nodeTitle">3 · Code + backtest</text>
    <text x="548" y="159" class="nodeSub">deterministic simulator</text>
    <text x="548" y="174" class="nodeSub">in-sample / out-of-sample</text>

    <rect x="770" y="110" width="290" height="74" rx="12" class="node"/>
    <text x="788" y="136" class="nodeTitle">4 · Risk gates (mechanical)</text>
    <text x="788" y="155" class="gate">deflated Sharpe · pool correlation &lt; 0.7</text>
    <text x="788" y="172" class="gate">cost gate · drawdown · turnover · baseline</text>

    <rect x="770" y="260" width="290" height="70" rx="12" class="node"/>
    <text x="788" y="288" class="nodeTitle">5 · Debate</text>
    <text x="788" y="307" class="nodeSub">researcher vs skeptic vs risk, chaired</text>

    <rect x="460" y="260" width="240" height="70" rx="12" class="node"/>
    <text x="478" y="288" class="nodeTitle">6 · Decision</text>
    <text x="478" y="307" class="nodeSub">candidate / retest / reject / archive</text>

    <rect x="120" y="260" width="270" height="70" rx="12" class="node"/>
    <text x="138" y="284" class="nodeTitle">7 · Memory + lineage</text>
    <text x="138" y="302" class="nodeSub">family stats, lessons, alpha decay,</text>
    <text x="138" y="317" class="nodeSub">parent → child refinement</text>
  </g>

  <!-- main flow -->
  <path class="flow" d="M 240 147 L 286 147"/>
  <path class="flow" d="M 480 147 L 526 147"/>
  <path class="flow" d="M 720 147 L 766 147"/>
  <path class="flow" d="M 915 184 L 915 256"/>
  <path class="flow" d="M 766 295 L 704 295"/>
  <path class="flow" d="M 456 295 L 394 295"/>
  <path class="flow" d="M 140 256 C 110 220 110 220 132 184"/>

  <!-- boss panel -->
  <rect x="40" y="420" width="1020" height="100" rx="14" fill="#2e2317"/>
  <path d="M 320 444 L 330 424 L 343 440 L 356 420 L 369 440 L 382 424 L 392 444 Z" fill="url(#lgold)"/>
  <text x="62" y="463" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="800" fill="#f3e7d2">YOU — the BOSS</text>
  <text x="62" y="491" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#cdbb9b">directives (EN / 中文) · Love · Whip</text>
  <text x="430" y="455" class="lbl" fill="#e9b455">"try momentum, 5-day holds" → family + horizon hints for the next idea</text>
  <text x="430" y="479" class="lbl" fill="#e9b455">Love a researcher → morale up, bolder exploration</text>
  <text x="430" y="503" class="lbl" fill="#e9b455">Whip the risk desk → stricter status thresholds, harsher gates</text>

  <!-- steering arrows -->
  <path class="steer" d="M 140 420 C 110 380 110 230 132 188"/>
  <text x="64" y="372" class="lbl">boss directive</text>
  <path class="steer" d="M 980 420 C 1010 380 1000 230 970 188"/>
  <text x="938" y="372" class="lbl">strictness</text>

  <!-- memory feedback -->
  <path class="steer" d="M 255 332 C 255 372 255 372 255 418"/>
  <text x="268" y="380" class="lbl">morale ↔ mood</text>
</svg>
