<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Quant Research Lab banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1914"/>
      <stop offset="0.48" stop-color="#2d241a"/>
      <stop offset="1" stop-color="#162725"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3cf7f"/>
      <stop offset="1" stop-color="#d49b41"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#54d7bb"/>
      <stop offset="1" stop-color="#87f2d4"/>
    </linearGradient>
    <style>
      .title { font: 800 54px 'Segoe UI', system-ui, sans-serif; fill: #fbf0dc; letter-spacing: 0; }
      .sub { font: 500 18px 'Segoe UI', system-ui, sans-serif; fill: #d5c4a8; }
      .chipText { font: 750 12.5px 'Segoe UI', system-ui, sans-serif; fill: #231a12; }
      .tiny { font: 650 12px 'Segoe UI', system-ui, sans-serif; fill: #9fd2c4; }
      .panelTitle { font: 800 16px 'Segoe UI', system-ui, sans-serif; fill: #fbf0dc; }
      .panelText { font: 600 13px 'Segoe UI', system-ui, sans-serif; fill: #cdbb9b; }
      .curve { animation: dash 5.4s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -180; } }
      .blink { animation: blink 2.8s ease-in-out infinite; }
      @keyframes blink { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="317" rx="17" fill="none" stroke="#7a5232" stroke-opacity="0.7" stroke-width="2"/>

  <text x="64" y="102" class="title">Quant Research Lab</text>
  <text x="66" y="138" class="sub">A local CLI research desk for real market tests, human review, and Workflow 2.0 audit records.</text>

  <g>
    <rect x="64" y="166" rx="12" width="132" height="28" fill="url(#gold)"/>
    <text x="78" y="185" class="chipText">20y prices</text>
    <rect x="208" y="166" rx="12" width="142" height="28" fill="url(#gold)"/>
    <text x="222" y="185" class="chipText">CLI proposals</text>
    <rect x="362" y="166" rx="12" width="148" height="28" fill="url(#gold)"/>
    <text x="376" y="185" class="chipText">human review</text>
    <rect x="522" y="166" rx="12" width="156" height="28" fill="url(#gold)"/>
    <text x="536" y="185" class="chipText">risk gates</text>
    <rect x="690" y="166" rx="12" width="176" height="28" fill="url(#gold)"/>
    <text x="704" y="185" class="chipText">point-in-time audit</text>
  </g>

  <g transform="translate(64 224)">
    <circle cx="0" cy="0" r="5" fill="#54d7bb" class="blink"/>
    <text x="16" y="5" class="tiny">hypothesis -> review -> backtest -> Workflow 2.0 -> fund board</text>
  </g>

  <g opacity="0.55">
    <line x1="620" y1="244" x2="1148" y2="244" stroke="#8d7355" stroke-width="1"/>
    <g fill="#54d7bb">
      <rect x="650" y="210" width="9" height="34" rx="2"/>
      <rect x="730" y="196" width="9" height="48" rx="2"/>
      <rect x="890" y="174" width="9" height="70" rx="2"/>
      <rect x="1030" y="150" width="9" height="94" rx="2"/>
    </g>
    <g fill="#ef6f6c">
      <rect x="690" y="222" width="9" height="22" rx="2"/>
      <rect x="800" y="206" width="9" height="38" rx="2"/>
      <rect x="950" y="188" width="9" height="56" rx="2"/>
      <rect x="1090" y="164" width="9" height="80" rx="2"/>
    </g>
    <path d="M 620 238 L 690 225 L 760 231 L 830 205 L 900 190 L 970 197 L 1040 162 L 1128 134"
          fill="none" stroke="url(#teal)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="13 8" class="curve"/>
    <path d="M 620 265 L 720 260 L 830 270 L 940 254 L 1040 264 L 1140 250"
          fill="none" stroke="#ef6f6c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <g transform="translate(790 56)">
    <rect x="0" y="0" width="330" height="100" rx="14" fill="#fff7e8" opacity="0.95"/>
    <path d="M 54 100 L 44 116 L 70 100 Z" fill="#fff7e8" opacity="0.95"/>
    <text x="20" y="32" class="panelTitle" fill="#3b2b1b">Workflow 2.0</text>
    <text x="20" y="58" class="panelText" fill="#5c4933">discovery card, source credibility,</text>
    <text x="20" y="78" class="panelText" fill="#5c4933">execution stress, baselines, paper trail</text>
  </g>

  <g transform="translate(990 92)">
    <path d="M 35 54 L 49 20 L 70 45 L 91 12 L 112 45 L 133 20 L 147 54 Z" fill="url(#gold)" stroke="#8a5c20" stroke-width="2.4" stroke-linejoin="round"/>
    <rect x="35" y="54" width="112" height="17" rx="5" fill="url(#gold)" stroke="#8a5c20" stroke-width="2.4"/>
    <circle cx="91" cy="36" r="5" fill="#ef6f6c"/>
  </g>
</svg>
