    <text x="908" y="115" class="boxName">HUD</text>
    <text x="908" y="132" class="boxSub">loop · level · fund NAV</text>
  </g>

  <!-- Direction lane -->
  <rect x="36" y="172" width="1028" height="96" rx="12" class="lane"/>
  <text x="52" y="194" class="laneTitle">CHARACTER DIRECTION</text>
  <g>
    <rect x="52" y="206" width="216" height="48" rx="9" class="box"/>
    <text x="66" y="227" class="boxName">OfficeDirector</text>
