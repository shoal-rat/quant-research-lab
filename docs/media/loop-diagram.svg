<svg width="1100" height="660" viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Research loop diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf5ea"/>
      <stop offset="1" stop-color="#f1e4cc"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302417"/>
      <stop offset="1" stop-color="#1d2a27"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5232"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9c95"/>
    </marker>
    <style>
      .hdr { font: 800 24px 'Segoe UI', system-ui, sans-serif; fill: #352819; letter-spacing: 0; }
      .sub { font: 500 12px 'Segoe UI', system-ui, sans-serif; fill: #766650; }
      .node { fill: #fffdf7; stroke: #7a5232; stroke-width: 2; }
      .audit { fill: #fffdf7; stroke: #2f9c95; stroke-width: 2.2; }
      .review { fill: #fff7e8; stroke: #d49b41; stroke-width: 2.2; }
      .title { font: 800 15px 'Segoe UI', system-ui, sans-serif; fill: #392a1b; }
      .note { font: 550 11.5px 'Segoe UI', system-ui, sans-serif; fill: #75644f; }
      .gate { font: 700 11.5px 'Segoe UI', system-ui, sans-serif; fill: #a33b35; }
      .flow { fill: none; stroke: #7a5232; stroke-width: 2.4; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #2f9c95; stroke-width: 2.3; stroke-dasharray: 7 6; marker-end: url(#arrowTeal); animation: dash 3.2s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -52; } }
      .bossTitle { font: 800 18px 'Segoe UI', system-ui, sans-serif; fill: #f5ead5; }
      .bossText { font: 600 13px 'Segoe UI', system-ui, sans-serif; fill: #d1c0a3; }
    </style>
  </defs>

  <rect width="1100" height="660" rx="16" fill="url(#bg)" stroke="#d8c5a5" stroke-width="2"/>
  <text x="40" y="48" class="hdr">Research loop with Workflow 2.0 audit</text>
  <text x="40" y="72" class="sub">The CLI proposes ideas. The browser keeps the scorecard, gates, memory, and fund state reproducible.</text>

  <g>
    <rect x="40" y="112" width="210" height="78" rx="12" class="node"/>
    <text x="56" y="139" class="title">1. Direction</text>
    <text x="56" y="159" class="note">Thompson bandit chooses</text>
    <text x="56" y="175" class="note">explore, refine, repair, recombine</text>

    <rect x="288" y="112" width="210" height="78" rx="12" class="node"/>
    <text x="304" y="139" class="title">2. CLI hypothesis</text>
    <text x="304" y="159" class="note">grounded in data profile,</text>
    <text x="304" y="175" class="note">knowledge base, desk memory</text>

    <rect x="536" y="112" width="210" height="78" rx="12" class="review"/>
    <text x="552" y="139" class="title">3. Human review</text>
    <text x="552" y="159" class="note">approve, reject, or edit</text>
    <text x="552" y="175" class="note">before spending a backtest</text>

    <rect x="784" y="112" width="240" height="78" rx="12" class="node"/>
    <text x="800" y="139" class="title">4. Backtest</text>
    <text x="800" y="159" class="note">bar t signal -> t+1 returns</text>
    <text x="800" y="175" class="note">costs, turnover, IS/OOS split</text>
  </g>

  <g>
    <rect x="784" y="282" width="240" height="92" rx="12" class="audit"/>
    <text x="800" y="308" class="title">5. Workflow 2.0</text>
    <text x="800" y="328" class="note">discovery card, compiled signal,</text>
    <text x="800" y="344" class="note">source credibility, point-in-time,</text>
    <text x="800" y="360" class="note">capacity, execution, baselines</text>

    <rect x="524" y="282" width="220" height="92" rx="12" class="node"/>
    <text x="540" y="308" class="title">6. Risk gates</text>
    <text x="540" y="328" class="gate">14 checks: Sharpe, costs,</text>
    <text x="540" y="344" class="gate">drawdown, baselines, source,</text>
    <text x="540" y="360" class="gate">capacity, execution stress</text>

    <rect x="284" y="282" width="200" height="92" rx="12" class="node"/>
    <text x="300" y="308" class="title">7. Debate</text>
    <text x="300" y="328" class="note">research, risk, skeptic,</text>
    <text x="300" y="344" class="note">manager decision text</text>

    <rect x="40" y="282" width="204" height="92" rx="12" class="node"/>
    <text x="56" y="308" class="title">8. Memory</text>
    <text x="56" y="328" class="note">family lessons, lineage,</text>
    <text x="56" y="344" class="note">MAP-Elites, decay, fund NAV</text>
  </g>

  <path class="flow" d="M 250 151 L 284 151"/>
  <path class="flow" d="M 498 151 L 532 151"/>
  <path class="flow" d="M 746 151 L 780 151"/>
  <path class="flow" d="M 904 190 L 904 278"/>
  <path class="flow" d="M 780 328 L 748 328"/>
  <path class="flow" d="M 520 328 L 488 328"/>
  <path class="flow" d="M 280 328 L 248 328"/>
  <path class="flow" d="M 134 282 C 82 240 92 210 138 193"/>

  <path class="feedback" d="M 142 374 C 142 438 664 438 664 378"/>
  <text x="318" y="430" class="title" fill="#2f9c95">decision -> memory -> next bandit posterior</text>

  <rect x="40" y="482" width="1024" height="132" rx="14" fill="url(#dark)"/>
  <text x="62" y="520" class="bossTitle">Boss controls</text>
  <text x="62" y="548" class="bossText">Directive bar: bias the next family, holding period, or strictness.</text>
  <text x="62" y="572" class="bossText">Human review: approve, reject, or edit a proposed hypothesis.</text>
  <text x="548" y="548" class="bossText">Fund board: NAV, niche grid, bandit posteriors, PBO, latest audit.</text>
  <text x="548" y="572" class="bossText">Love / whip: morale and gate strictness are part of the simulation.</text>
</svg>
