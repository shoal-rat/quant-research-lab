    <text x="646" y="339" class="boxName">poolAnalytics</text>
    <text x="646" y="356" class="boxSub">ΔSharpe · niches · PBO</text>
    <rect x="834" y="318" width="120" height="48" rx="9" class="box"/>
    <text x="848" y="339" class="boxName">riskReview</text>
    <text x="848" y="356" class="boxSub">10 gates</text>
    <rect x="970" y="318" width="78" height="48" rx="9" class="box"/>
    <text x="980" y="339" class="boxName">memory</text>
