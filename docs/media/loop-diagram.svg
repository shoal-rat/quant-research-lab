<svg width="1100" height="640" viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Research loop diagram">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf5ea"/>
      <stop offset="1" stop-color="#f2e7d3"/>
    </linearGradient>
    <linearGradient id="lgold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9b455"/>
      <stop offset="1" stop-color="#d49b41"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a5232"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9c95"/>
    </marker>
    <style>
      .node { fill: #fffdf7; stroke: #7a5232; stroke-width: 2; }
      .nodeTitle { font: 700 15.5px 'Segoe UI', system-ui, sans-serif; fill: #3c2e1f; }
      .nodeSub { font: 500 11.5px 'Segoe UI', system-ui, sans-serif; fill: #82705a; }
      .gate { font: 700 12px 'Segoe UI', system-ui, sans-serif; fill: #a33b35; }
      .flow { fill: none; stroke: #7a5232; stroke-width: 2.4; marker-end: url(#arr); }
      .steer { fill: none; stroke: #2f9c95; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrTeal); animation: flowdash 3.2s linear infinite; }
      @keyframes flowdash { to { stroke-dashoffset: -52; } }
      .hdr { font: 800 23px 'Segoe UI', system-ui, sans-serif; fill: #3c2e1f; }
      .lbl { font: 700 13px 'Segoe UI', system-ui, sans-serif; fill: #2f9c95; }
    </style>
  </defs>

  <rect width="1100" height="640" rx="16" fill="url(#lbg)" stroke="#d8c5a5" stroke-width="2"/>
  <text x="40" y="48" class="hdr">The self-iterating research loop — on 20 years of real markets</text>
  <text x="40" y="72" class="nodeSub">every box is acted out by the characters in the office — every number they say comes from a real backtest</text>

  <!-- row 1 -->
  <g>
    <rect x="40" y="110" width="240" height="80" rx="12" class="node"/>
    <text x="56" y="138" class="nodeTitle">0 · Direction bandit</text>
    <text x="56" y="157" class="nodeSub">Thompson sampling over 4 arms:</text>
    <text x="56" y="172" class="nodeSub">explore · refine · repair · recombine</text>

    <rect x="320" y="110" width="220" height="80" rx="12" class="node"/>
    <text x="336" y="138" class="nodeTitle">1 · Hypothesis</text>
    <text x="336" y="157" class="nodeSub">14-family knowledge base,</text>
    <text x="336" y="172" class="nodeSub">steered toward open niches</text>

    <rect x="580" y="110" width="210" height="80" rx="12" class="node"/>
    <text x="596" y="138" class="nodeTitle">2 · Data check</text>
    <text x="596" y="157" class="nodeSub">timestamp + coverage audit</text>
    <text x="596" y="172" class="nodeSub">no lookahead, no leaks</text>

    <rect x="830" y="110" width="230" height="80" rx="12" class="node"/>
    <text x="846" y="138" class="nodeTitle">3 · Real backtest</text>
    <text x="846" y="157" class="nodeSub">20y daily closes · 32 tickers</text>
    <text x="846" y="172" class="nodeSub">costs · turnover · IS/OOS split</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="770" y="280" width="290" height="80" rx="12" class="node"/>
    <text x="786" y="306" class="nodeTitle">4 · Risk gates (mechanical)</text>
    <text x="786" y="326" class="gate">deflated Sharpe · pool correlation &lt; 0.7</text>
    <text x="786" y="343" class="gate">cost gate · drawdown · turnover · baseline</text>

    <rect x="510" y="280" width="220" height="80" rx="12" class="node"/>
    <text x="526" y="306" class="nodeTitle">5 · Debate</text>
    <text x="526" y="326" class="nodeSub">researcher vs skeptic vs risk,</text>
    <text x="526" y="341" class="nodeSub">chaired at the meeting table</text>

    <rect x="270" y="280" width="200" height="80" rx="12" class="node"/>
    <text x="286" y="306" class="nodeTitle">6 · Decision</text>
    <text x="286" y="326" class="nodeSub">candidate / retest / reject</text>
    <text x="286" y="341" class="nodeSub">scored by pool ΔSharpe</text>

    <rect x="40" y="280" width="190" height="80" rx="12" class="node"/>
    <text x="56" y="306" class="nodeTitle">7 · Memory</text>
    <text x="56" y="326" class="nodeSub">lessons · lineage · decay</text>
    <text x="56" y="341" class="nodeSub">MAP-Elites niche archive</text>
  </g>

  <!-- main flow -->
  <path class="flow" d="M 280 150 L 316 150"/>
  <path class="flow" d="M 540 150 L 576 150"/>
  <path class="flow" d="M 790 150 L 826 150"/>
  <path class="flow" d="M 945 190 L 945 276"/>
  <path class="flow" d="M 766 320 L 734 320"/>
  <path class="flow" d="M 506 320 L 474 320"/>
  <path class="flow" d="M 266 320 L 234 320"/>
  <path class="flow" d="M 110 276 C 80 236 90 220 130 194"/>

  <!-- pool ΔSharpe reward back to the bandit -->
  <path class="steer" d="M 370 364 C 370 412 250 416 250 364 L 250 194"/>
  <text x="268" y="403" class="lbl">pool ΔSharpe reward → bandit posterior</text>

  <!-- boss panel -->
  <rect x="40" y="470" width="1020" height="130" rx="14" fill="#2e2317"/>
  <path d="M 320 496 L 330 476 L 343 492 L 356 472 L 369 492 L 382 476 L 392 496 Z" fill="url(#lgold)"/>
  <text x="62" y="513" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="800" fill="#f3e7d2">YOU — the BOSS</text>
  <text x="62" y="541" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#cdbb9b">directives (EN / 中文) · Love · Whip</text>
  <text x="62" y="563" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#cdbb9b">XP · levels · achievements · fund NAV</text>
  <text x="430" y="503" class="lbl" fill="#e9b455">"try momentum, 5-day holds" → family + horizon hints for the next idea</text>
  <text x="430" y="527" class="lbl" fill="#e9b455">Love a researcher → morale up, bolder exploration</text>
  <text x="430" y="551" class="lbl" fill="#e9b455">Whip the risk desk → stricter status thresholds, harsher gates</text>
  <text x="430" y="575" class="lbl" fill="#e9b455">Fund &amp; Research Board → niche grid · bandit posteriors · CSCV PBO</text>

  <!-- steering arrows -->
  <path class="steer" d="M 490 470 C 490 430 490 240 432 194"/>
  <text x="500" y="437" class="lbl">boss directive</text>
  <path class="steer" d="M 980 470 C 1010 430 1000 400 970 364"/>
  <text x="938" y="430" class="lbl">strictness</text>
  <path class="steer" d="M 135 360 C 135 400 135 430 135 466"/>
  <text x="60" y="443" class="lbl">morale ↔ mood</text>
</svg>
