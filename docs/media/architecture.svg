    <text x="66" y="132" class="boxSub">stage, hotspots, effects</text>
    <rect x="228" y="94" width="150" height="48" rx="9" class="box"/>
    <text x="242" y="115" class="boxName">BoardPage</text>
    <text x="242" y="132" class="boxSub">fund · niches · PBO</text>
    <rect x="394" y="94" width="146" height="48" rx="9" class="boxAlt"/>
    <text x="408" y="115" class="boxName">BossBar</text>
    <text x="408" y="132" class="boxSub">directives EN/中文</text>
    <rect x="556" y="94" width="166" height="48" rx="9" class="boxAlt"/>
